name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || true   # lint hoje não bloqueia
      - run: npm run build

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    env:
      NEXT_PUBLIC_API_URL: /api
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || true
      - run: npm run build

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: crm-backend:ci
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: crm-frontend:ci
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy (Coolify force rebuild)
    runs-on: ubuntu-latest
    needs: [docker-build]
    # Só deploya em push para main, não em PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deploy (force rebuild)
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "https://coolify.qualitysmi.com.br/api/v1/deploy?uuid=${{ secrets.COOLIFY_APP_UUID }}&force=true")
          echo "Coolify response: $RESPONSE"
          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ] && [ "$RESPONSE" -ne 202 ]; then
            echo "Deploy trigger failed with status $RESPONSE"
            exit 1
          fi
          echo "Deploy triggered successfully"
