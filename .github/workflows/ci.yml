name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/quality-smi/crm-backend
  IMAGE_FRONTEND: ghcr.io/quality-smi/crm-frontend

jobs:
  backend:
    name: Backend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || true
      - run: npm run build

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    env:
      NEXT_PUBLIC_API_URL: /api
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || true
      - run: npm run build

  docker-push:
    name: Build & push Docker images (GHCR)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Só faz push em push para main (não em PRs — PRs usam apenas os jobs de lint/build)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy (Coolify webhook)
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deploy
        # continue-on-error: o token pode estar expirado — o GitHub App do Coolify
        # vai disparar o deploy de qualquer forma via webhook do push.
        # Este step é um safety-net extra; sua falha não deve bloquear o pipeline.
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://145.79.7.208:8000/api/v1/deploy?uuid=kcsw0w8k0gks8o8ksk88kc0w&force=true")
          echo "Coolify webhook response: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 202 ]; then
            echo "Coolify deploy acionado com sucesso."
          else
            echo "AVISO: Coolify webhook retornou $RESPONSE (token expirado?)."
            echo "O GitHub App do Coolify vai disparar o deploy automaticamente pelo push."
          fi
