name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || true
      - run: npm run build

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    env:
      NEXT_PUBLIC_API_URL: /api
      NEXT_TELEMETRY_DISABLED: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint || true
      - run: npm run build

  deploy:
    name: Deploy (Coolify webhook)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deploy
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            "http://145.79.7.208:8000/api/v1/deploy?uuid=kcsw0w8k0gks8o8ksk88kc0w&force=true")
          echo "Coolify response: $RESPONSE"
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ] || [ "$RESPONSE" -eq 202 ]; then
            echo "Deploy acionado com sucesso."
          else
            echo "ERRO: Coolify retornou $RESPONSE"
            exit 1
          fi
