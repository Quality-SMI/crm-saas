user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time uct=$upstream_connect_time';
    access_log  /var/log/nginx/access.log  main;

    # ─── Tuning ──────────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    client_max_body_size 25m;
    server_tokens off;

    # gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss text/xml application/xml image/svg+xml;

    # ─── Rate limit zones ────────────────────────────────────────────────────
    # Endpoints sensíveis de auth — 10 req/min por IP
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    # Demais APIs — 30 req/s por IP (burst no server block)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    include /etc/nginx/conf.d/*.conf;
}
