# Compose de produção. Subir com:
#   docker compose -f infrastructure/docker/docker-compose.prod.yml --env-file infrastructure/.env.prod up -d --build
# Pré-requisitos: ver DEPLOY.md.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: crm-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: crm-redis-prod
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: crm-backend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-crm}
      REDIS_URL: redis://redis:6379
      APP_URL: ${APP_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.key
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      # Chaves JWT lidas read-only de fora do container
      - ${JWT_KEYS_HOST_PATH:-./keys}:/run/secrets:ro
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [internal]

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* é compilado no bundle — precisa do valor real no build.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: crm-frontend-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
    depends_on:
      backend: { condition: service_started }
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    container_name: crm-nginx-prod
    restart: unless-stopped
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      NGINX_ENVSUBST_TEMPLATE_SUFFIX: ".template"
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx/conf.d
      NGINX_ENVSUBST_FILTER: APP_DOMAIN
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/templates:/etc/nginx/templates:ro
      - ../nginx/snippets:/etc/nginx/snippets:ro
      - ../nginx/htpasswd:/etc/nginx/htpasswd:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks: [internal, web]

volumes:
  postgres_data:
  redis_data:
  certbot_www:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
