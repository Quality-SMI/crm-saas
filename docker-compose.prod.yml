services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - APP_URL=${APP_URL}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_SCHEMA=${DATABASE_SCHEMA:-crm}
      - REDIS_URL=${REDIS_URL}
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_ACCESS_EXPIRES_IN=${JWT_ACCESS_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL}
      - RESEND_FROM_NAME=${RESEND_FROM_NAME}
      - RESEND_WEBHOOK_SECRET=${RESEND_WEBHOOK_SECRET}
      - WEBHOOK_UNSUBSCRIBE_SECRET=${WEBHOOK_UNSUBSCRIBE_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - crm-internal
      - coolify
    labels:
      - "coolify.managed=true"

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    networks:
      - crm-internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ""
    container_name: crm-frontend
    restart: unless-stopped
    environment:
      - NEXT_API_PROXY_TARGET=http://backend:3000
    networks:
      - crm-internal
      - coolify
    depends_on:
      - backend
      - redis
    labels:
      - "coolify.managed=true"
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.routers.http-crm-frontend.entryPoints=http"
      - "traefik.http.routers.http-crm-frontend.middlewares=redirect-to-https"
      - "traefik.http.routers.http-crm-frontend.rule=Host(`app.qualitysmi.com.br`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-crm-frontend.entryPoints=https"
      - "traefik.http.routers.https-crm-frontend.middlewares=gzip"
      - "traefik.http.routers.https-crm-frontend.rule=Host(`app.qualitysmi.com.br`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-crm-frontend.tls=true"
      - "traefik.http.routers.https-crm-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.crm-frontend.loadbalancer.server.port=3001"

networks:
  crm-internal:
    driver: bridge
  coolify:
    external: true
